<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration | WestCoast Education</title>
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="admin.js"></script>
  </head>
  <body>
    <header>
      <nav class="container">
        <div class="logo">WestCoast<span>Admin</span></div>
        <ul class="nav-links">
          <li><a href="../index.html">Visa hemsidan</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="admin-section">
        <h2>Lägg till ny kurs</h2>
        <p>Fyll i formuläret för att skapa en ny kurs i utbudet.</p>

        <form id="addCourseForm" class="booking-form">
          <div class="form-group">
            <label>Kurstitel</label>
            <input
              type="text"
              id="title"
              name="title"
              required
              placeholder="t.ex. Programmering i C#"
            />
          </div>
          <div class="form-group">
            <label>Kursnummer / ID</label>
            <input
              type="text"
              id="courseId"
              name="id"
              required
              placeholder="t.ex. CS-202"
            />
          </div>
          <div class="form-group">
            <label>Längd (Antal dagar)</label>
            <input
              type="text"
              id="length"
              name="length"
              required
              placeholder="t.ex. 5 dagar"
            />
          </div>
          <div class="form-group">
            <label>Kostnad (SEK)</label>
            <input
              type="number"
              id="price"
              name="price"
              required
              placeholder="t.ex. 15000"
            />
          </div>
          <div class="form-group">
            <label>Startdatum</label>
            <input
              type="text"
              id="startDate"
              name="startDate"
              required
              placeholder="t.ex. 2024-10-12"
            />
          </div>
          <div class="form-group">
            <label>Beskrivning</label>
            <textarea
              id="description"
              name="description"
              required
              placeholder="Kort beskrivning av kursen..."
            ></textarea>
          </div>

          <button type="submit" class="btn-primary">Spara kurs</button>
        </form>
      </section>

      <hr />

      <section class="admin-section">
        <h2>Inkomna Bokningar</h2>
        <div id="bookingsList">
          <p>Laddar bokningar...</p>
        </div>
      </section>
    </main>
  </body>
</html>
